name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webui/package-lock.json

      - name: WebUI - install
        run: cd webui && npm ci
      - name: WebUI - typecheck
        run: cd webui && npx tsc -b
      - name: WebUI - build
        run: cd webui && npm run build

      - name: Embed webui dist
        run: rm -rf internal/webassets/webui_dist && mkdir -p internal/webassets/webui_dist && cp -R webui/dist/* internal/webassets/webui_dist/

      - name: Go test
        run: go test ./...

